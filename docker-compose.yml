services:
  db:
    image: postgres:16-alpine
    container_name: odontogesta-db
    environment:
      POSTGRES_DB: odontogesta
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Dmenez3ZEs
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: odontogesta-backend
    environment:
      DATABASE_URL: postgresql://postgres:Dmenez3ZEs@db:5432/odontogesta?schema=public
      FRONTEND_URL: https://localhost:5173
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
