name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy VPS
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}

          script: |
            cd /root/OdontoGesta/OdontoGesta

            git pull origin main
            cd frontend
            
            npm install
            npm run build
            sudo rm -rf /var/www/odontogesta/dist
            sudo cp -r dist /var/www/odontogesta/
            sudo systemctl restart nginx
            cd ..
            docker compose up -d --build
